<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const { jsPDF } = window.jspdf;

function generarPDF() {
  const nombre = document.getElementById("nombre").value;
  const rfc = document.getElementById("rfc").value;
  const curp = document.getElementById("curp").value;

  const doc = new jsPDF();

  // ENCABEZADO
  doc.setFillColor(97, 18, 50);
  doc.rect(0, 0, 210, 15, "F");

  doc.setTextColor(255,255,255);
  doc.setFontSize(12);
  doc.text("Gobierno de México", 10, 10);

  doc.setTextColor(0,0,0);

  // TÍTULO
  doc.setFontSize(14);
  doc.text("CONSTANCIA DE SITUACIÓN FISCAL", 20, 30);

  // LINEA
  doc.line(20, 40, 190, 40);

  // SECCIÓN
  doc.setFontSize(11);
  doc.text("DATOS DEL CONTRIBUYENTE", 20, 50);

  doc.setFontSize(10);

  doc.text("Nombre:", 20, 60);
  doc.text(nombre, 60, 60);

  doc.text("RFC:", 20, 70);
  doc.text(rfc, 60, 70);

  doc.text("CURP:", 20, 80);
  doc.text(curp, 60, 80);

  // CUADRO
  doc.rect(15, 55, 180, 35);

  // PIE
  doc.setFontSize(8);
  doc.text("Documento generado con fines académicos", 20, 270);

  doc.save("constancia.pdf");
}
</script>
