<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Constancia Fiscal</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  margin: 0;
}

.header {
  background: #611232;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.container {
  background: white;
  width: 90%;
  max-width: 400px;
  margin: 30px auto;
  padding: 20px;
  border-radius: 8px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}
</style>

</head>
<body>

<div class="header">Gobierno de México</div>

<div class="container">
  <h3>Constancia de Situación Fiscal</h3>

  <input type="text" id="nombre" placeholder="Nombre completo">
  <input type="text" id="rfc" placeholder="RFC">
  <input type="text" id="curp" placeholder="CURP">

  <button onclick="generarPDF()">Generar PDF</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>

<script>
const { jsPDF } = window.jspdf;

function generarPDF() {
  const nombre = document.getElementById("nombre").value;
  const rfc = document.getElementById("rfc").value;
  const curp = document.getElementById("curp").value;

  const doc = new jsPDF();

  // ===== HEADER =====
  doc.setFillColor(40,50,55);
  doc.rect(0,0,210,15,"F");

  // ===== BLOQUE IZQUIERDO =====
  doc.rect(15,25,80,60);
  doc.setFontSize(9);
  doc.text("CÉDULA DE IDENTIFICACIÓN FISCAL", 18, 30);

  // QR REAL
  const qrCanvas = document.createElement("canvas");
  QRCode.toCanvas(qrCanvas, rfc, function () {
    const qrImg = qrCanvas.toDataURL("image/png");
    doc.addImage(qrImg, "PNG", 18, 35, 30, 30);

    doc.text("RFC:", 55, 45);
    doc.text(rfc, 55, 50);

    doc.text("Nombre:", 55, 60);
    doc.text(nombre, 55, 65);

    // ===== BLOQUE DERECHO =====
    doc.rect(105,25,90,12);
    doc.setFontSize(11);
    doc.text("CONSTANCIA DE SITUACIÓN FISCAL", 108, 33);

    const fecha = new Date().toLocaleDateString();

    doc.rect(105,40,90,12);
    doc.setFontSize(9);
    doc.text("Lugar y Fecha de Emisión", 108, 45);
    doc.text("México, " + fecha, 108, 50);

    // ===== CÓDIGO DE BARRAS =====
    const canvas = document.createElement("canvas");
    JsBarcode(canvas, rfc, {format: "CODE128"});
    const barcode = canvas.toDataURL("image/png");

    doc.addImage(barcode, "PNG", 110, 55, 80, 20);

    // ===== TABLA =====
    let y = 100;

    doc.setFontSize(11);
    doc.text("Datos de Identificación del Contribuyente:", 15, y);

    y += 10;
    doc.setFontSize(10);

    function fila(label, valor) {
      doc.setFillColor(240,240,240);
      doc.rect(15, y - 5, 70, 8, "F");
      doc.rect(85, y - 5, 110, 8);

      doc.text(label, 17, y);
      doc.text(valor, 87, y);

      y += 8;
    }

    fila("RFC:", rfc);
    fila("CURP:", curp);
    fila("Nombre(s):", nombre);
    fila("Primer Apellido:", "");
    fila("Segundo Apellido:", "");
    fila("Fecha inicio:", "");
    fila("Estatus:", "");
    fila("Último cambio:", "");
    fila("Nombre Comercial:", "");

    y += 5;

    doc.setFontSize(11);
    doc.text("Datos del domicilio registrado", 15, y);

    y += 10;
    doc.setFontSize(10);

    fila("Código Postal:", "");
    fila("Vialidad:", "");
    fila("Número:", "");
    fila("Colonia:", "");
    fila("Municipio:", "");
    fila("Entidad:", "");

    doc.setFontSize(8);
    doc.text("Página 1 de 2", 160, 280);

    doc.save("constancia.pdf");
  });
}
</script>

</body>
</html>
