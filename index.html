<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Constancia Fiscal</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  margin: 0;
}

.header {
  background: #611232;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.container {
  background: white;
  width: 90%;
  max-width: 400px;
  margin: 30px auto;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  color: #611232;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #611232;
  color: white;
  border: none;
  border-radius: 5px;
  font-weight: bold;
}
</style>

</head>
<body>

<div class="header">
  Gobierno de México
</div>

<div class="container">
  <h2>Constancia de Situación Fiscal</h2>

  <input type="text" id="nombre" placeholder="Nombre completo">
  <input type="text" id="rfc" placeholder="RFC">
  <input type="text" id="curp" placeholder="CURP">

  <button onclick="generarPDF()">Generar PDF</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const { jsPDF } = window.jspdf;

function generarPDF() {
  const nombre = document.getElementById("nombre").value;
  const rfc = document.getElementById("rfc").value;
  const curp = document.getElementById("curp").value;

  const doc = new jsPDF();

  // ENCABEZADO
  doc.setFillColor(97, 18, 50);
  doc.rect(0, 0, 210, 15, "F");

  doc.setTextColor(255,255,255);
  doc.setFontSize(12);
  doc.text("Gobierno de México", 10, 10);

  doc.setTextColor(0,0,0);

  // TÍTULO
  doc.setFontSize(14);
  doc.text("CONSTANCIA DE SITUACIÓN FISCAL", 20, 30);

  // FECHA Y FOLIO
  const fecha = new Date().toLocaleDateString();
  const folio = Math.floor(Math.random() * 1000000000);

  doc.setFontSize(10);
  doc.text("Fecha de emisión: " + fecha, 20, 35);
  doc.text("Folio: " + folio, 140, 35);

  // LINEA
  doc.line(20, 40, 190, 40);

  // SECCIÓN
  doc.setFontSize(11);
  doc.text("DATOS DEL CONTRIBUYENTE", 20, 50);

  doc.setFontSize(10);

  doc.text("Nombre:", 20, 60);
  doc.text(nombre, 80, 60);

  doc.text("RFC:", 20, 70);
  doc.text(rfc, 80, 70);

  doc.text("CURP:", 20, 80);
  doc.text(curp, 80, 80);

  // CUADRO
  doc.setLineWidth(0.5);
  doc.rect(15, 55, 180, 40);

  // LINEA EXTRA
  doc.line(20, 100, 190, 100);

  doc.save("constancia.pdf");
}
</script>

</body>
</html>
